<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GPA Calc">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern GPA Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top left,#2563eb33,transparent 25%),
radial-gradient(circle at bottom right,#7c3aed33,transparent 25%),#020617;
color:white;
min-height:100vh;
padding-bottom:80px;
}

/* Loader */
#loader{
position:fixed;inset:0;
background:#020617;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
}
.loader-spinner{
width:60px;height:60px;
border-radius:50%;
border:4px solid rgba(255,255,255,.1);
border-top:4px solid #38bdf8;
animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

.container{
max-width:1100px;
margin:auto;
padding:25px 15px;
}

.hero{text-align:center;margin-bottom:15px}
.hero h1{
font-size:40px;
background:linear-gradient(to right,#38bdf8,#818cf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tabs{
display:flex;
justify-content:center;
gap:10px;
margin:15px 0;
}

.tab{
padding:10px 14px;
border-radius:12px;
background:#0f172a;
border:1px solid rgba(255,255,255,.1);
cursor:pointer;
color:#94a3b8;
}

.tab.active{
background:linear-gradient(135deg,#2563eb,#7c3aed);
color:white;
}

.main-card{
background:rgba(15,23,42,.75);
border-radius:18px;
padding:15px;
}

table{width:100%;border-collapse:collapse}
th,td{
padding:12px;
border-top:1px solid rgba(255,255,255,.05);
text-align:left;
}

select{
width:100%;
padding:8px;
border-radius:10px;
background:#0f172a;
color:white;
border:1px solid rgba(255,255,255,.1);
}

.cards{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:15px;
}

.card{
background:#0f172a;
padding:15px;
border-radius:14px;
text-align:center;
}

.result{
font-size:32px;
font-weight:700;
}

/* Mobile Nav */
.mobile-nav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
background:rgba(15,23,42,.95);
backdrop-filter:blur(12px);
border-top:1px solid rgba(255,255,255,.08);
z-index:999;
}

.nav-item{
flex:1;
text-align:center;
padding:10px 0;
color:#94a3b8;
cursor:pointer;
font-size:12px;
}

.nav-item i{
display:block;
font-size:20px;
margin-bottom:3px;
}

.nav-item.active{
color:#38bdf8;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
<div class="loader-spinner"></div>
</div>

<div class="container">

<div class="hero">
<h1>GPA Calculator</h1>
</div>

<!-- TOP TABS -->
<div class="tabs">
<div class="tab active" data-tab="preEngineering">Pre-Eng</div>
<div class="tab" data-tab="naturalScience">Science</div>
</div>

<!-- TABLE -->
<div class="main-card">
<table>
<thead>
<tr>
<th>Subject</th>
<th>CH</th>
<th>Grade</th>
</tr>
</thead>
<tbody id="subjectsTable"></tbody>
</table>

<div class="cards">
<div class="card">
<div>GPA</div>
<div class="result" id="gpa">0.00</div>
</div>

<div class="card">
<div>CGPA</div>
<div class="result" id="cgpa">0.00</div>
</div>
</div>

</div>
</div>

<!-- MOBILE NAV -->
<div class="mobile-nav">
<div class="nav-item active" data-tab="preEngineering">
<i class="ri-flashlight-fill"></i>
Pre-Eng
</div>

<div class="nav-item" data-tab="naturalScience">
<i class="ri-leaf-fill"></i>
Science
</div>
</div>

<script>

/* ─── DATA ─── */
const subjectSets = {
preEngineering: [
["Global Trends",4],
["Civics",4],
["English II",5],
["Geography",5],
["Psychology",5],
["Programming",5],
["Applied Math",5]
],
naturalScience: [
["Global Trends",4],
["Civics",4],
["English II",5],
["Geography",5],
["Psychology",5],
["Chemistry",5],
["Biology",5]
]
};

const gradePoints = {
"A+":4,"A":4,"A-":3.75,
"B+":3.5,"B":3,"B-":2.75,
"C+":2.5,"C":2,"C-":1.75,
"D":1,"F":0
};

const STORAGE_KEY="gpa_app_v4";

let activeTab="preEngineering";
let storedData={};

/* ─── SAFE LOAD ─── */
function loadData(){
try{
const raw=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
activeTab=raw.activeTab||"preEngineering";
storedData=raw.tabs||{};
}catch(e){
storedData={};
activeTab="preEngineering";
}
}

/* ─── SAVE ─── */
function saveData(){
localStorage.setItem(STORAGE_KEY,JSON.stringify({
activeTab,
tabs:storedData
}));
}

/* ─── RENDER ─── */
function render(){
const tbody=document.getElementById("subjectsTable");
tbody.innerHTML="";

subjectSets[activeTab].forEach((sub,i)=>{
const saved=storedData?.[activeTab]?.[i]||"4";

tbody.innerHTML+=`
<tr>
<td>${sub[0]}</td>
<td>${sub[1]}</td>
<td>
<select data-i="${i}" data-ch="${sub[1]}">
${Object.entries(gradePoints).map(([g,v])=>
`<option value="${v}" ${v==saved?"selected":""}>${g}</option>`
).join("")}
</select>
</td>
</tr>`;
});

attachEvents();
calculate();
}

/* ─── CALCULATE ─── */
function calculate(){
let total=0,ch=0;

document.querySelectorAll("select").forEach(s=>{
total+=parseFloat(s.value)*parseFloat(s.dataset.ch);
ch+=parseFloat(s.dataset.ch);
});

document.getElementById("gpa").innerText=(total/ch).toFixed(2);
document.getElementById("cgpa").innerText=(total/ch).toFixed(2);

saveSelections();
}

/* ─── SAVE PER TAB ─── */
function saveSelections(){
storedData[activeTab]={};

document.querySelectorAll("select").forEach(s=>{
storedData[activeTab][s.dataset.i]=s.value;
});

saveData();
}

/* ─── EVENTS ─── */
function attachEvents(){
document.querySelectorAll("select").forEach(s=>{
s.onchange=calculate;
});
}

/* ─── TAB SWITCH ─── */
function setTab(tab){
activeTab=tab;

document.querySelectorAll(".tab,.nav-item").forEach(el=>{
el.classList.toggle("active",el.dataset.tab===tab);
});

saveData();
render();
}

document.querySelectorAll(".tab,.nav-item").forEach(el=>{
el.onclick=()=>setTab(el.dataset.tab);
});

/* ─── INIT (FIXED LOADER) ─── */
loadData();

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},400);

setTab(activeTab);
});

</script>

</body>
</html>
