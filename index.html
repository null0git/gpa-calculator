<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#020617">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GPA Calc">

<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern GPA Calculator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:radial-gradient(circle at top left,#2563eb33,transparent 25%),radial-gradient(circle at bottom right,#7c3aed33,transparent 25%),#020617;color:white;min-height:100vh}

#loader{position:fixed;inset:0;background:#020617;display:flex;justify-content:center;align-items:center;z-index:9999}
.loader-spinner{width:65px;height:65px;border-radius:50%;border:4px solid rgba(255,255,255,.08);border-top:4px solid #38bdf8;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.container{max-width:1150px;margin:auto;padding:35px 20px}

.hero{text-align:center;margin-bottom:25px}
.hero h1{font-size:46px;background:linear-gradient(to right,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.tabs{display:flex;gap:10px;justify-content:center;margin:20px 0}
.tab{padding:10px 16px;border-radius:12px;border:1px solid rgba(255,255,255,.1);cursor:pointer;background:#0f172a;color:#cbd5e1}
.tab.active{background:linear-gradient(135deg,#2563eb,#7c3aed);color:white}

.main-card{background:rgba(15,23,42,.72);border-radius:20px;padding:20px}

table{width:100%;border-collapse:collapse}
th,td{padding:14px;border-top:1px solid rgba(255,255,255,.05)}

.subject{font-weight:600}

select,input{width:100%;padding:10px;border-radius:10px;background:#0f172a;color:white;border:1px solid rgba(255,255,255,.1)}

.cards{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-top:20px}
.card{padding:20px;border-radius:16px;background:#0f172a}
.result{font-size:36px;font-weight:700}

</style>
</head>

<body>

<div id="loader">
<div class="loader-spinner"></div>
</div>

<div class="container">

<div class="hero">
<h1>GPA Calculator</h1>
</div>

<!-- TABS -->
<div class="tabs">
<div class="tab active" data-tab="preEngineering">Pre-Engineering</div>
<div class="tab" data-tab="naturalScience">Natural Science</div>
</div>

<div class="main-card">

<table>
<thead>
<tr>
<th>Subject</th>
<th>CH</th>
<th>Grade</th>
</tr>
</thead>
<tbody id="subjectsTable"></tbody>
</table>

<div class="cards">
<div class="card">
<div>GPA</div>
<div class="result" id="gpa">0.00</div>
</div>
<div class="card">
<div>CGPA</div>
<div class="result" id="cgpa">0.00</div>
</div>
</div>

</div>
</div>

<script>

// ─── SUBJECT SETS ─────────────────────────────
const subjectSets = {
preEngineering: [
["Global Trends",4],
["Civics",4],
["English II",5],
["Geography",5],
["Psychology",5],
["Programming",5],
["Applied Math",5]
],
naturalScience: [
["Global Trends",4],
["Civics",4],
["English II",5],
["Geography",5],
["Psychology",5],
["Chemistry",5],
["Biology",5]
]
};

const gradePoints = {
"A+":4,"A":4,"A-":3.75,
"B+":3.5,"B":3,"B-":2.75,
"C+":2.5,"C":2,"C-":1.75,
"D":1,"F":0
};

// ─── STORAGE ─────────────────────────────
const STORAGE_KEY="gpa_v2";

let activeTab="preEngineering";

// ─── LOAD SAVE ───────────────────────────
function loadData(){
const raw=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}");
activeTab = raw.activeTab || "preEngineering";
return raw;
}

function saveData(){
const data = {
activeTab,
tabs: storedData,
firstGpa: document.getElementById("first_gpa")?.value || ""
};
localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ─── DATA CACHE ─────────────────────────
let storedData = loadData().tabs || {};

// ─── RENDER TABS ────────────────────────
const tbody=document.getElementById("subjectsTable");

function render(){
tbody.innerHTML="";
const subjects = subjectSets[activeTab];

subjects.forEach(([name,ch],i)=>{

const saved = storedData?.[activeTab]?.[i] || "4";

tbody.innerHTML+=`
<tr>
<td class="subject">${name}</td>
<td>${ch}</td>
<td>
<select data-i="${i}" data-ch="${ch}">
${Object.entries(gradePoints).map(([g,v])=>
`<option value="${v}" ${v==saved?"selected":""}>${g}</option>`
).join("")}
</select>
</td>
</tr>`;
});

attachEvents();
calculate();
}

// ─── CALCULATE ───────────────────────────
function calculate(){
let total=0,ch=0;

document.querySelectorAll("select").forEach(s=>{
total += parseFloat(s.value)*parseFloat(s.dataset.ch);
ch += parseFloat(s.dataset.ch);
});

document.getElementById("gpa").innerText=(total/ch).toFixed(2);
document.getElementById("cgpa").innerText=(total/ch).toFixed(2);

saveSelections();
}

// ─── SAVE PER TAB ────────────────────────
function saveSelections(){
storedData[activeTab] = {};
document.querySelectorAll("select").forEach(s=>{
storedData[activeTab][s.dataset.i]=s.value;
});
saveData();
}

// ─── EVENTS ─────────────────────────────
function attachEvents(){
document.querySelectorAll("select").forEach(s=>{
s.onchange=calculate;
});
}

// ─── TAB SWITCH ──────────────────────────
document.querySelectorAll(".tab").forEach(t=>{
t.onclick=()=>{
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
t.classList.add("active");
activeTab=t.dataset.tab;
saveData();
render();
};
});

// ─── INIT ────────────────────────────────
render();

// set active tab UI
document.querySelector(`[data-tab="${activeTab}"]`).classList.add("active");

</script>

</body>
</html>
