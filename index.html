<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern GPA Calculator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:radial-gradient(circle at top left,#2563eb33,transparent 25%),radial-gradient(circle at bottom right,#7c3aed33,transparent 25%),#020617;color:white;min-height:100vh}
#loader{position:fixed;inset:0;background:#020617;display:flex;justify-content:center;align-items:center;z-index:9999;transition:.5s}
.loader-content{text-align:center}
.loader-spinner{width:65px;height:65px;border-radius:50%;border:4px solid rgba(255,255,255,.08);border-top:4px solid #38bdf8;animation:spin 1s linear infinite;margin:auto auto 18px}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{color:#94a3b8;font-size:15px;letter-spacing:1px}
.container{width:100%;max-width:1150px;margin:auto;padding:35px 20px}
.hero{text-align:center;margin-bottom:35px}
.hero-icon{width:90px;height:90px;margin:auto auto 20px;border-radius:24px;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 12px 30px rgba(0,0,0,.4)}
.hero-icon i{font-size:42px}
.hero h1{font-size:54px;font-weight:700;margin-bottom:12px;background:linear-gradient(to right,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:#94a3b8;font-size:17px}
.main-card{background:rgba(15,23,42,.72);border:1px solid rgba(255,255,255,.06);backdrop-filter:blur(18px);border-radius:30px;overflow:hidden;box-shadow:0 15px 50px rgba(0,0,0,.35)}
.table-wrapper{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:22px;background:rgba(255,255,255,.03);color:#94a3b8;font-size:13px;letter-spacing:1px;text-transform:uppercase}
td{padding:22px;border-top:1px solid rgba(255,255,255,.05)}
tr:hover{background:rgba(255,255,255,.025)}
.subject{font-weight:600;font-size:16px}
.credit{color:#cbd5e1}
.select-wrapper{position:relative}
.select-wrapper i{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:#94a3b8;pointer-events:none;font-size:14px}
.modern-select,.modern-input{width:100%;background:#0f172a;border:1px solid rgba(255,255,255,.08);color:white;outline:none;transition:.3s}
.modern-select{appearance:none;padding:10px 12px;padding-right:32px;border-radius:12px;font-size:13px;cursor:pointer;height:38px}
.modern-input{padding:17px;border-radius:18px;font-size:16px}
.modern-select:hover{border-color:#3b82f6}
.modern-select:focus,.modern-input:focus{border-color:#38bdf8;box-shadow:0 0 0 4px rgba(56,189,248,.12)}
.content{padding:32px}
.input-group{margin-bottom:28px}
.input-group label{display:flex;align-items:center;gap:10px;margin-bottom:14px;color:#cbd5e1;font-weight:500}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:22px}
.card{background:linear-gradient(145deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.07);border-radius:24px;padding:28px;transition:.35s}
.card:hover{transform:translateY(-6px)}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.card-title{color:#94a3b8;font-size:15px}
.card-icon{width:52px;height:52px;border-radius:15px;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#2563eb,#7c3aed)}
.card-icon i{font-size:24px}
.result{font-size:58px;font-weight:700;background:linear-gradient(to right,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.footer{text-align:center;color:#64748b;margin-top:25px;font-size:14px}
@media(max-width:768px){.hero h1{font-size:38px}td,th{padding:16px}.result{font-size:42px}}
</style>
</head>
<body>

<div id="loader">
<div class="loader-content">
<div class="loader-spinner"></div>
<div class="loader-text">Loading GPA Calculator...</div>
</div>
</div>

<div class="container">
<div class="hero">
<div class="hero-icon"><i class="ri-graduation-cap-fill"></i></div>
<h1>GPA Calculator</h1>
<p>Professional University GPA & CGPA Calculator</p>
</div>

<div class="main-card">
<div class="table-wrapper">
<table>
<thead>
<tr>
<th>Subject</th>
<th>Credit Hour</th>
<th>Grade</th>
</tr>
</thead>
<tbody id="subjectsTable"></tbody>
</table>
</div>

<div class="content">
<div class="input-group">
<label><i class="ri-book-open-line"></i> First Semester GPA (Optional)</label>
<input type="number" id="first_gpa" class="modern-input" step="0.01" min="0" max="4" placeholder="Example: 3.75">
</div>

<div class="cards">
<div class="card">
<div class="card-top">
<div class="card-title">Semester GPA</div>
<div class="card-icon"><i class="ri-bar-chart-fill"></i></div>
</div>
<div class="result" id="gpa">0.00</div>
</div>

<div class="card">
<div class="card-top">
<div class="card-title">Overall CGPA</div>
<div class="card-icon"><i class="ri-medal-fill"></i></div>
</div>
<div class="result" id="cgpa">0.00</div>
</div>
</div>
</div>
</div>

<div class="footer">Standalone HTML • Live Calculation • Browser Cache</div>
</div>

<script>
const subjects=[
["Global Trends",4],
["Civics",4],
["English II",5],
["Geography",5],
["Psychology",5],
["Programming",5],
["Applied Math",5]
];

const gradePoints={
"A+":4.00,"A":4.00,"A-":3.75,
"B+":3.50,"B":3.00,"B-":2.75,
"C+":2.50,"C":2.00,"C-":1.75,
"D":1.00,"F":0.00
};

const tbody=document.getElementById("subjectsTable");

subjects.forEach(([subject,ch],index)=>{
const options=Object.entries(gradePoints)
.map(([grade,val])=>`<option value="${val}">${grade}</option>`)
.join("");

tbody.innerHTML+=`
<tr>
<td class="subject">${subject}</td>
<td class="credit">${ch} CH</td>
<td>
<div class="select-wrapper">
<select class="modern-select grade" data-ch="${ch}" data-index="${index}">
${options}
</select>
<i class="ri-arrow-down-s-line"></i>
</div>
</td>
</tr>`;
});

window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.opacity="0";
setTimeout(()=>{
document.getElementById("loader").style.display="none";
},400);
},600);
});

const grades=document.querySelectorAll(".grade");
const gpaElement=document.getElementById("gpa");
const cgpaElement=document.getElementById("cgpa");
const firstGpaInput=document.getElementById("first_gpa");

function loadCachedData(){
grades.forEach((select,index)=>{
const saved=localStorage.getItem("grade_"+index);
if(saved) select.value=saved;
});

const savedGpa=localStorage.getItem("first_gpa");
if(savedGpa) firstGpaInput.value=savedGpa;
}

function saveData(){
grades.forEach((select,index)=>{
localStorage.setItem("grade_"+index,select.value);
});
localStorage.setItem("first_gpa",firstGpaInput.value);
}

function calculate(){
let totalPoints=0,totalCH=0;

grades.forEach(select=>{
const point=parseFloat(select.value);
const ch=parseFloat(select.dataset.ch);
totalPoints+=point*ch;
totalCH+=ch;
});

const gpa=totalPoints/totalCH;
gpaElement.textContent=gpa.toFixed(2);

const firstGPA=parseFloat(firstGpaInput.value);

if(!isNaN(firstGPA)){
const firstCH=29;
const cgpa=((firstGPA*firstCH)+(gpa*totalCH))/(firstCH+totalCH);
cgpaElement.textContent=cgpa.toFixed(2);
}else{
cgpaElement.textContent=gpa.toFixed(2);
}

saveData();
}

grades.forEach(select=>select.addEventListener("change",calculate));
firstGpaInput.addEventListener("input",calculate);

loadCachedData();
calculate();
</script>
</body>
</html>
